<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Accident Prevention & Alert Platform</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Leaflet CSS for Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar glass-panel">
            <div class="logo">
                <i class="fas fa-shield-alt icon-glow"></i>
                <h2>SafeGuard AI</h2>
            </div>
            <nav>
                <ul>
                    <li class="active"><i class="fas fa-desktop"></i> Dashboard</li>
                    <li><i class="fas fa-video"></i> Cameras</li>
                    <li><i class="fas fa-bell"></i> Alerts</li>
                    <li><i class="fas fa-chart-line"></i> Analytics</li>
                    <li><i class="fas fa-cog"></i> Settings</li>
                </ul>
            </nav>
            <div class="emergency-button-container">
                <button id="manual-emergency-btn" class="btn-danger glow-effect">
                    <i class="fas fa-exclamation-triangle"></i> TRIGGER SOS
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar glass-panel">
                <div class="status-summary">
                    <div class="status-badge pulse-green" id="overall-status">
                        <i class="fas fa-check-circle"></i> System Active
                    </div>
                </div>
                <div class="user-profile">
                    <img src="https://ui-avatars.com/api/?name=Admin+User&background=0D8ABC&color=fff" alt="User">
                    <span>Admin User</span>
                </div>
            </header>

            <div class="grid-container">
                <!-- Video Feeds -->
                <div class="video-section">
                    <div class="video-card glass-panel">
                        <div class="card-header">
                            <h3><i class="fas fa-car-side"></i> In-Vehicle Driver Monitor</h3>
                            <span class="status-indicator" id="driver-status-text">Safe</span>
                        </div>
                        <div class="video-feed">
                            <img src="{{ url_for('driver_video_feed') }}" alt="Driver Feed" onerror="this.src='https://via.placeholder.com/640x480?text=Camera+Offline'">
                        </div>
                    </div>
                    
                    <div class="video-card glass-panel">
                        <div class="card-header">
                            <h3><i class="fas fa-traffic-light"></i> External CCTV Monitor</h3>
                            <span class="status-indicator" id="cctv-status-text">Normal Traffic</span>
                        </div>
                        <div class="video-feed">
                            <img src="{{ url_for('cctv_video_feed') }}" alt="CCTV Feed" onerror="this.src='https://via.placeholder.com/640x480?text=CCTV+Offline'">
                        </div>
                    </div>
                </div>

                <!-- Right Sidebar (Map & Logs) -->
                <div class="info-section">
                    <!-- Live Map -->
                    <div class="map-card glass-panel">
                        <div class="card-header">
                            <h3><i class="fas fa-map-marker-alt"></i> Live GPS Tracking</h3>
                        </div>
                        <div id="map" class="map-container"></div>
                    </div>

                    <!-- Event Logs -->
                    <div class="log-card glass-panel">
                        <div class="card-header">
                            <h3><i class="fas fa-list-alt"></i> Emergency Event Log</h3>
                        </div>
                        <div class="log-container" id="event-log">
                            <div class="log-item info">
                                <i class="fas fa-info-circle"></i>
                                <div class="log-details">
                                    <span class="log-time">Just now</span>
                                    <p>System initialized and monitoring started.</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
